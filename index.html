<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Sudoku Cipher</title>
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0b0e14;
            --cell-bg: #161b22;
            --border: #30363d;
            --highlight: #818cf8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .sudoku-board {
            display: grid;
            grid-template-columns: repeat(9, 40px);
            grid-template-rows: repeat(9, 40px);
            border: 2px solid var(--primary);
            gap: 1px;
            margin-bottom: 25px;
            background: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }

        .cell {
            width: 40px;
            height: 40px;
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: bold;
            color: var(--highlight);
        }

        /* 3x3 Grid Styling */
        .cell:nth-child(3n) { border-right: 2px solid var(--primary); }
        .cell:nth-child(9n) { border-right: none; }
        .cell:nth-child(n+19):nth-child(-n+27),
        .cell:nth-child(n+46):nth-child(-n+54) { border-bottom: 2px solid var(--primary); }

        .controls {
            width: 100%;
            max-width: 375px;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: #0d1117;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #c9d1d9;
            padding: 12px;
            margin-bottom: 15px;
            box-sizing: border-box;
            resize: none;
            font-size: 0.9rem;
        }

        .btn-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .enc-btn { background: var(--primary); color: white; }
        .dec-btn { background: #21262d; color: #c9d1d9; border: 1px solid var(--border); }
        button:hover { filter: brightness(1.3); transform: translateY(-1px); }

        .status {
            font-size: 0.7rem;
            margin-top: 15px;
            color: #8b949e;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="sudoku-board" id="board"></div>

    <div class="controls">
        <textarea id="ioBox" placeholder="Enter message to Encrypt OR paste Scrambled Code to Decrypt..."></textarea>
        <div class="btn-group">
            <button class="enc-btn" onclick="handleEncrypt()">Encrypt & Scramble</button>
            <button class="dec-btn" onclick="handleDecrypt()">Decrypt Code</button>
        </div>
        <p class="status" id="statusMsg">SYSTEM STANDBY</p>
    </div>

<script>
    const board = document.getElementById('board');
    const ioBox = document.getElementById('ioBox');
    const statusMsg = document.getElementById('statusMsg');

    // Secret permutation key based on a solved Sudoku
    const key = [
        1,2,3,4,5,6,7,8,9, 4,5,6,7,8,9,1,2,3, 7,8,9,1,2,3,4,5,6,
        2,3,1,5,6,4,8,9,7, 5,6,4,8,9,7,2,3,1, 8,9,7,2,3,1,5,6,4,
        3,1,2,6,4,5,9,7,8, 6,4,5,9,7,8,3,1,2, 9,7,8,3,1,2,6,4,5
    ];

    // Initialize the visual board
    for (let i = 0; i < 81; i++) {
        const div = document.createElement('div');
        div.className = 'cell';
        div.id = `cell-${i}`;
        board.appendChild(div);
    }

    function handleEncrypt() {
        const rawText = ioBox.value.toUpperCase();
        if (!rawText) return;

        // 1. Scramble into the grid
        let gridState = new Array(81).fill('');
        let charIdx = 0;

        // Map characters to the "Sudoku Path"
        for (let num = 1; num <= 9; num++) {
            for (let i = 0; i < key.length; i++) {
                if (key[i] === num) {
                    if (charIdx < rawText.length) {
                        gridState[i] = rawText[charIdx];
                        charIdx++;
                    } else {
                        // Fill with noise
                        gridState[i] = String.fromCharCode(65 + Math.floor(Math.random() * 26));
                    }
                }
            }
        }

        // 2. Update Visuals
        gridState.forEach((char, i) => document.getElementById(`cell-${i}`).innerText = char);

        // 3. Generate Secret String (Grid data + original length for recovery)
        const encryptedData = {
            grid: gridState.join(''),
            len: rawText.length
        };
        ioBox.value = btoa(JSON.stringify(encryptedData)); // Convert to Base64
        statusMsg.innerText = "ENCRYPTION COMPLETE: COPY THE CODE ABOVE";
    }

    function handleDecrypt() {
        try {
            const secretCode = ioBox.value.trim();
            const decodedData = JSON.parse(atob(secretCode));
            const gridArray = decodedData.grid.split('');
            const originalLen = decodedData.len;

            // 1. Display the scrambled grid
            gridArray.forEach((char, i) => document.getElementById(`cell-${i}`).innerText = char);

            // 2. Reverse the Transposition
            let result = "";
            let count = 0;
            for (let num = 1; num <= 9; num++) {
                for (let i = 0; i < key.length; i++) {
                    if (key[i] === num) {
                        if (count < originalLen) {
                            result += gridArray[i];
                            count++;
                        }
                    }
                }
            }

            ioBox.value = result;
            statusMsg.innerText = "DECRYPTION SUCCESSFUL";
        } catch (e) {
            statusMsg.innerText = "ERROR: INVALID SECRET CODE";
        }
    }
</script>
</body>
</html>
